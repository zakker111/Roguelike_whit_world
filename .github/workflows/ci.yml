name: Tiny Roguelike CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # No lockfile in repo, so npm ci would fail. If/when package-lock.json is added,
        # switching back to npm ci is recommended for reproducibility.
        run: npm install

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-roguelike-dist
          path: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa/dist