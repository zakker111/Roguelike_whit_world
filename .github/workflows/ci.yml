name: Tiny Roguelike CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      phase6_repeats:
        description: 'How many times to run acceptance:phase6 (flake detection)'
        required: false
        default: '1'
      phase0_repeats:
        description: 'How many times to run acceptance:phase0 (fresh-start flake detection)'
        required: false
        default: '1'
      run_phase0:
        description: 'Whether to run acceptance:phase0'
        type: boolean
        required: false
        default: true

jobs:
  build-lint-acceptance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa
    env:
      PHASE6_REPEATS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.phase6_repeats || '1' }}
      PHASE0_REPEATS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.phase0_repeats || '1' }}
      RUN_PHASE0: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_phase0 == true || github.event.inputs.run_phase0 == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Prepare QA artifacts dir
        run: mkdir -p artifacts/qa

      # Repo does not include a package-lock.json, so use npm install instead of npm ci.
      - name: Install dependencies
        run: |
          set -euo pipefail
          npm install 2>&1 | tee artifacts/qa/npm_install.log

      - name: Install Playwright (Chromium + OS deps)
        run: |
          set -euo pipefail
          npx playwright install --with-deps chromium 2>&1 | tee artifacts/qa/playwright_install.log

      - name: Lint (strict)
        run: |
          set -euo pipefail
          npm run lint:strict 2>&1 | tee artifacts/qa/lint_strict.log

      - name: Check docs catalog paths
        run: |
          set -euo pipefail
          npm run check:docs-catalog 2>&1 | tee artifacts/qa/check_docs_catalog.log

      - name: Build
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee artifacts/qa/build.log

      - name: Acceptance (phase6)
        run: |
          set -euo pipefail
          mkdir -p artifacts/qa

          repeats="${PHASE6_REPEATS:-1}"
          if ! [[ "$repeats" =~ ^[0-9]+$ ]] || [ "$repeats" -lt 1 ]; then
            repeats=1
          fi

          for i in $(seq 1 "$repeats"); do
            echo "Running acceptance:phase6 (${i}/${repeats})"
            npm run acceptance:phase6 2>&1 | tee "artifacts/qa/acceptance_phase6_run${i}.log"
          done

      - name: Acceptance (phase0)
        if: ${{ env.RUN_PHASE0 == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/qa

          repeats="${PHASE0_REPEATS:-1}"
          if ! [[ "$repeats" =~ ^[0-9]+$ ]] || [ "$repeats" -lt 1 ]; then
            repeats=1
          fi

          for i in $(seq 1 "$repeats"); do
            echo "Running acceptance:phase0 (${i}/${repeats})"
            npm run acceptance:phase0 2>&1 | tee "artifacts/qa/acceptance_phase0_run${i}.log"
          done

      - name: Upload QA logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiny-roguelike-qa-logs
          path: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa/artifacts/qa

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-roguelike-dist
          path: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa/dist
