name: Tiny Roguelike CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-lint-acceptance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Repo does not include a package-lock.json, so use npm install instead of npm ci.
      - name: Install dependencies
        run: npm install

      - name: Install Playwright (Chromium + OS deps)
        run: npx playwright install --with-deps chromium

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Build
        run: npm run build

      - name: Acceptance (phase6)
        run: npm run acceptance:phase6

      - name: Acceptance (phase0)
        run: npm run acceptance:phase0

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-roguelike-dist
          path: ROguelike 3_10_2025 filut jarjestyksessa luultavasti vikaa/dist