name: Acceptance — Phase 6 Smoketest

on:
  workflow_dispatch:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  phase6-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      # This repo intentionally has no lockfile, so use `npm install`.
      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium (with OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run lint + build
        run: npm run ci

      - name: Run Phase 6 acceptance harness
        shell: bash
        run: |
          set -euo pipefail
          node scripts/run_phase6_acceptance.js | tee phase6_acceptance.json

      - name: Upload acceptance report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase6_acceptance
          path: phase6_acceptance.json
