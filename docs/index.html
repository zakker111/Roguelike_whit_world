<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roguelike with World - Play Now</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.5em;
            margin: 0 0 20px 0;
            color: #60a5fa;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        .play-button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        .info {
            margin-top: 40px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
        }
        .controls {
            margin-top: 20px;
            font-size: 0.9em;
            text-align: left;
            display: inline-block;
        }
        .controls strong {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Roguelike with World</h1>
        <p>A browser-based roguelike with procedural worlds, dungeons, and towns.</p>
        
        <button class="play-button" onclick="window.location.href = 'game/'">
            🎮 Play Game
        </button>
        
        <div class="info">
            <h3>Quick Controls</h3>
            <div class="controls">
                <div><strong>Arrow Keys:</strong> Move</div>
                <div><strong>G:</strong> Interact / Loot / Enter</div>
                <div><strong>I:</strong> Inventory</div>
                <div><strong>P:</strong> GOD Panel (Debug)</div>
                <div><strong>F1:</strong> Help</div>
            </div>
        </div>
    </div>

    <!-- Auto-redirect after 1 second if JavaScript is available -->
    <script>
        setTimeout(() => {
            // Redirect to the game
            // Note: Commenting out auto-redirect to let user click button
            // window.location.href = 'game/';
        }, 1000);
    </script>
</body>
</html>
